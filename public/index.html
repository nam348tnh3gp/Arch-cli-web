<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Linux Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            color: #00ff9d;
            font-family: 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar */
        .toolbar {
            background: #1a1f2e;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid #00ff9d;
        }

        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .status-badge {
            background: #00ff9d;
            color: #0a0f1e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Stats Bar */
        .stats-bar {
            background: #1a1f2e;
            padding: 10px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #2a3a4a;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #4a5b6e;
            font-size: 10px;
            text-transform: uppercase;
        }

        .stat-value {
            color: #00ff9d;
            font-size: 16px;
            font-weight: bold;
        }

        .stat-unit {
            color: #4a5b6e;
            font-size: 10px;
            margin-left: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a3a4a;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00ff9d;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Terminal */
        #terminal {
            flex: 1;
            background: #0a0f1e;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Command Input */
        .command-line {
            background: #1a1f2e;
            padding: 15px 20px;
            border-top: 2px solid #00ff9d;
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #ff5555;
            font-weight: bold;
            margin-right: 15px;
            font-size: 16px;
        }

        #command {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff9d;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            outline: none;
        }

        /* Quick Commands */
        .quick-commands {
            padding: 10px 20px;
            background: #1a1f2e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #2a3a4a;
        }

        .quick-btn {
            background: #0a0f1e;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .quick-btn:hover {
            background: #00ff9d;
            color: #0a0f1e;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0f1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff9d;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-item">
            <span>🐧 Arch Linux</span>
            <span class="status-badge" id="connection-status">●</span>
        </div>
        <div class="toolbar-item" style="margin-left: auto;">
            <span id="hostname">-</span>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-label">CPU</span>
            <div>
                <span class="stat-value" id="cpu-value">0</span>
                <span class="stat-unit">%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="cpu-progress" style="width: 0%"></div>
            </div>
        </div>
        <div class="stat">
            <span class="stat-label">RAM</span>
            <div>
                <span class="stat-value" id="ram-value">0</span>
                <span class="stat-unit">%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="ram-progress" style="width: 0%"></div>
            </div>
        </div>
        <div class="stat">
            <span class="stat-label">DISK</span>
            <div>
                <span class="stat-value" id="disk-value">0</span>
                <span class="stat-unit">%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="disk-progress" style="width: 0%"></div>
            </div>
        </div>
        <div class="stat">
            <span class="stat-label">UPTIME</span>
            <span class="stat-value" id="uptime-value">0h</span>
        </div>
        <div class="stat">
            <span class="stat-label">PACKAGES</span>
            <span class="stat-value" id="packages-value">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">LOAD</span>
            <span class="stat-value" id="load-value">0.0</span>
        </div>
    </div>

    <!-- Terminal -->
    <div id="terminal"></div>

    <!-- Quick Commands -->
    <div class="quick-commands">
        <button class="quick-btn" onclick="addCommand('neofetch')">🖥️ System Info</button>
        <button class="quick-btn" onclick="addCommand('htop')">📊 HTOP</button>
        <button class="quick-btn" onclick="addCommand('pacman -Syu')">📦 Update</button>
        <button class="quick-btn" onclick="addCommand('df -h')">💾 Disk</button>
        <button class="quick-btn" onclick="addCommand('free -h')">🧠 Memory</button>
        <button class="quick-btn" onclick="addCommand('clear')">🗑️ Clear</button>
    </div>

    <!-- Command Input -->
    <div class="command-line">
        <span class="prompt">#</span>
        <input type="text" id="command" placeholder="Type command..." autocomplete="off">
    </div>

    <script>
        // DOM Elements
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command');
        let ws = null;
        let commandHistory = [];
        let historyIndex = 0;

        // Stats Elements
        const cpuValue = document.getElementById('cpu-value');
        const cpuProgress = document.getElementById('cpu-progress');
        const ramValue = document.getElementById('ram-value');
        const ramProgress = document.getElementById('ram-progress');
        const diskValue = document.getElementById('disk-value');
        const diskProgress = document.getElementById('disk-progress');
        const uptimeValue = document.getElementById('uptime-value');
        const packagesValue = document.getElementById('packages-value');
        const loadValue = document.getElementById('load-value');
        const hostnameEl = document.getElementById('hostname');

        // Connect WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                document.getElementById('connection-status').style.background = '#00ff9d';
                log('✅ Connected\n# ');
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'output') {
                    if (data.data === '# ') {
                        terminal.innerHTML += `<span style="color: #ff5555;"># </span>`;
                    } else {
                        terminal.innerHTML += escapeHtml(data.data);
                    }
                } else if (data.type === 'stats') {
                    // Update stats từ WebSocket
                    cpuValue.textContent = data.cpu;
                    cpuProgress.style.width = data.cpu + '%';
                    ramValue.textContent = data.ram;
                    ramProgress.style.width = data.ram + '%';
                    
                    const hours = Math.floor(data.uptime / 3600);
                    uptimeValue.textContent = hours + 'h';
                }
                terminal.scrollTop = terminal.scrollHeight;
            };

            ws.onclose = () => {
                document.getElementById('connection-status').style.background = '#ff5555';
                setTimeout(connect, 3000);
            };
        }

        // Fetch stats từ REST API
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                cpuValue.textContent = data.cpu;
                cpuProgress.style.width = data.cpu + '%';
                
                ramValue.textContent = data.ram;
                ramProgress.style.width = data.ram + '%';
                
                diskValue.textContent = data.disk;
                diskProgress.style.width = data.disk + '%';
                
                uptimeValue.textContent = data.uptime;
                packagesValue.textContent = data.packages;
                loadValue.textContent = data.loadavg;
                hostnameEl.textContent = data.hostname;
            } catch (err) {
                console.error('Stats error:', err);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function log(msg) {
            terminal.innerHTML += msg;
        }

        function addCommand(cmd) {
            commandInput.value = cmd;
            commandInput.focus();
        }

        function sendCommand() {
            const cmd = commandInput.value.trim();
            if (!cmd) return;

            commandHistory.push(cmd);
            historyIndex = commandHistory.length;

            terminal.innerHTML += `<span style="color: #00ff9d;"># ${escapeHtml(cmd)}</span>\n`;

            if (cmd === 'clear') {
                terminal.innerHTML = '';
            } else if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'command', command: cmd }));
            }

            commandInput.value = '';
        }

        // Event listeners
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = '';
                }
            }
        });

        // Initialize
        connect();
        commandInput.focus();
        
        // Fetch stats mỗi 2 giây
        fetchStats();
        setInterval(fetchStats, 2000);
    </script>
</body>
</html>
