<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Linux Full Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            color: #00ff9d;
            font-family: 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Terminal Toolbar */
        .toolbar {
            background: #1a1f2e;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid #00ff9d;
            color: #00ff9d;
        }

        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .toolbar-item i {
            font-size: 16px;
        }

        .status-badge {
            background: #00ff9d;
            color: #0a0f1e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Main Terminal */
        #terminal {
            flex: 1;
            background: #0a0f1e;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Command Input */
        .command-line {
            background: #1a1f2e;
            padding: 15px 20px;
            border-top: 2px solid #00ff9d;
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #ff5555;
            font-weight: bold;
            margin-right: 15px;
            font-size: 16px;
        }

        #command {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff9d;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            outline: none;
        }

        #command::placeholder {
            color: #4a5b6e;
        }

        /* Quick Commands */
        .quick-commands {
            padding: 10px 20px;
            background: #1a1f2e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #2a3a4a;
        }

        .quick-btn {
            background: #0a0f1e;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .quick-btn:hover {
            background: #00ff9d;
            color: #0a0f1e;
        }

        .quick-btn.danger {
            border-color: #ff5555;
            color: #ff5555;
        }

        .quick-btn.danger:hover {
            background: #ff5555;
            color: #0a0f1e;
        }

        /* System Info */
        .system-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 15px 20px;
            background: #1a1f2e;
            border-top: 1px solid #2a3a4a;
            font-size: 12px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #4a5b6e;
            font-size: 10px;
            text-transform: uppercase;
        }

        .info-value {
            color: #00ff9d;
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0f1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff9d;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-item">
            <i>🐧</i>
            <span>Arch Linux</span>
            <span class="status-badge">FULL</span>
        </div>
        <div class="toolbar-item">
            <i>📦</i>
            <span id="package-count">-</span>
        </div>
        <div class="toolbar-item">
            <i>⚡</i>
            <span id="cpu-usage">-</span>
        </div>
        <div class="toolbar-item">
            <i>🧠</i>
            <span id="memory-usage">-</span>
        </div>
        <div class="toolbar-item" style="margin-left: auto;">
            <i id="connection-status">●</i>
            <span id="status-text">Connected</span>
        </div>
    </div>

    <!-- Terminal -->
    <div id="terminal"></div>

    <!-- Quick Commands -->
    <div class="quick-commands">
        <button class="quick-btn" onclick="addCommand('neofetch')">🖥️ System Info</button>
        <button class="quick-btn" onclick="addCommand('htop')">📊 HTOP</button>
        <button class="quick-btn" onclick="addCommand('pacman -Syu')">📦 Update System</button>
        <button class="quick-btn" onclick="addCommand('pacman -Ss')">🔍 Search Package</button>
        <button class="quick-btn" onclick="addCommand('yt-dlp -F')">📋 yt-dlp Formats</button>
        <button class="quick-btn" onclick="addCommand('df -h')">💾 Disk Usage</button>
        <button class="quick-btn" onclick="addCommand('free -h')">🧠 Memory</button>
        <button class="quick-btn" onclick="addCommand('ip a')">🌐 Network</button>
        <button class="quick-btn" onclick="addCommand('ps aux')">📋 Processes</button>
        <button class="quick-btn" onclick="addCommand('clear')">🗑️ Clear</button>
        <button class="quick-btn danger" onclick="addCommand('exit')">🚪 Exit</button>
    </div>

    <!-- Command Input -->
    <div class="command-line">
        <span class="prompt">#</span>
        <input type="text" id="command" placeholder="Type any Arch Linux command..." autocomplete="off" spellcheck="false">
    </div>

    <!-- System Info -->
    <div class="system-info">
        <div class="info-item">
            <span class="info-label">Hostname</span>
            <span class="info-value" id="hostname">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Kernel</span>
            <span class="info-value" id="kernel">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Uptime</span>
            <span class="info-value" id="uptime">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Packages</span>
            <span class="info-value" id="packages">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Shell</span>
            <span class="info-value" id="shell">bash</span>
        </div>
        <div class="info-item">
            <span class="info-label">Terminal</span>
            <span class="info-value" id="terminal-type">xterm</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command');
        let ws = null;
        let commandHistory = [];
        let historyIndex = 0;

        // Connect WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                document.getElementById('connection-status').style.color = '#00ff9d';
                document.getElementById('status-text').textContent = 'Connected';
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'output') {
                    if (data.data === '# ') {
                        terminal.innerHTML += `<span style="color: #ff5555;"># </span>`;
                    } else {
                        terminal.innerHTML += escapeHtml(data.data);
                    }
                } else if (data.type === 'error') {
                    terminal.innerHTML += `<span style="color: #ff5555;">❌ ${escapeHtml(data.data)}</span>`;
                }
                terminal.scrollTop = terminal.scrollHeight;
            };

            ws.onclose = () => {
                document.getElementById('connection-status').style.color = '#ff5555';
                document.getElementById('status-text').textContent = 'Disconnected';
                setTimeout(connect, 3000);
            };
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add command to input
        function addCommand(cmd) {
            commandInput.value = cmd;
            commandInput.focus();
        }

        // Send command
        function sendCommand() {
            const cmd = commandInput.value.trim();
            if (!cmd) return;

            // Add to history
            commandHistory.push(cmd);
            historyIndex = commandHistory.length;

            // Display command
            terminal.innerHTML += `<span style="color: #00ff9d;">[root@arch]# ${escapeHtml(cmd)}</span>\n`;

            // Handle special commands
            if (cmd === 'clear') {
                terminal.innerHTML = '';
            } else if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'command', command: cmd }));
            } else {
                terminal.innerHTML += `<span style="color: #ff5555;">❌ Not connected\n</span>`;
                terminal.innerHTML += `<span style="color: #ff5555;"># </span>`;
            }

            commandInput.value = '';
        }

        // Event listeners
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = '';
                }
            }
        });

        // Update system info
        async function updateSystemInfo() {
            try {
                const res = await fetch('/api/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: 'uname -n; uname -r; cat /proc/uptime; pacman -Q | wc -l' })
                });
                const data = await res.json();
                const parts = data.output.split('\n');
                document.getElementById('hostname').textContent = parts[0] || '-';
                document.getElementById('kernel').textContent = parts[1] || '-';
                const uptime = parseFloat(parts[2]) || 0;
                const hours = Math.floor(uptime / 3600);
                document.getElementById('uptime').textContent = `${hours}h`;
                document.getElementById('packages').textContent = parts[3] || '-';
            } catch (err) {
                console.error('Failed to update system info:', err);
            }
        }

        // Initialize
        connect();
        commandInput.focus();
        updateSystemInfo();
        setInterval(updateSystemInfo, 10000);
    </script>
</body>
</html>
