<!DOCTYPE html>
<html>
<head>
    <title>Arch Terminal Controller</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #00ff00;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        #terminal {
            flex: 1;
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,255,0,0.1);
        }
        .input-line {
            display: flex;
            align-items: center;
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 10px;
        }
        .prompt {
            color: #ff0000;
            font-weight: bold;
            margin-right: 10px;
            font-size: 16px;
        }
        #command {
            flex: 1;
            background: #000;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
        }
        .status {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            color: #888;
            font-size: 12px;
        }
        .connected {
            color: #00ff00;
        }
        .root-badge {
            background: #ff0000;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        .output {
            margin: 5px 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>
        Arch Linux Terminal Controller 
        <span class="root-badge">ROOT</span>
    </h1>
    
    <div id="terminal">
        <div class="output">=========================================</div>
        <div class="output">Arch Linux Terminal Controller [ROOT]</div>
        <div class="output">=========================================</div>
        <div class="output">Type 'help' for commands</div>
        <div class="output">=========================================</div>
    </div>
    
    <div class="input-line">
        <span class="prompt">#</span>
        <input type="text" id="command" placeholder="Enter command as root..." autocomplete="off">
    </div>
    
    <div class="status">
        <span id="connection-status">🔴 Disconnected</span>
        <span id="hostname">Host: -</span>
        <span id="time">Time: <span id="clock"></span></span>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command');
        const connectionStatus = document.getElementById('connection-status');
        let ws = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                connectionStatus.innerHTML = '🟢 Connected (Root)';
                connectionStatus.className = 'connected';
                log('✅ Connected to Arch Linux with ROOT privileges');
                log('⚠️ You are operating as root - be careful!');
                log('# ');
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'output') {
                    log(data.data);
                    log('# ');
                } else if (data.type === 'system') {
                    log(`ℹ️ ${data.data}`);
                } else if (data.type === 'error') {
                    log(`❌ ${data.data}`);
                    log('# ');
                }
            };
            
            ws.onclose = () => {
                connectionStatus.innerHTML = '🔴 Disconnected';
                connectionStatus.className = '';
                log('❌ Disconnected from server');
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                log(`❌ WebSocket error: ${error.message}`);
            };
        }

        function log(message) {
            if (message === '# ') {
                terminal.innerHTML += `<div class="output" style="color: #ff0000;"># </div>`;
            } else {
                terminal.innerHTML += `<div class="output">${escapeHtml(message)}</div>`;
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && commandInput.value.trim()) {
                const cmd = commandInput.value.trim();
                
                if (cmd.toLowerCase() === 'clear') {
                    terminal.innerHTML = '';
                    log('=========================================');
                    log('Arch Linux Terminal Controller [ROOT]');
                    log('=========================================');
                    log('# ');
                } else if (cmd.toLowerCase() === 'exit') {
                    ws.close();
                } else {
                    log(`[root@arch]# ${cmd}`);
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'command',
                            command: cmd
                        }));
                    } else {
                        log('❌ Not connected to server');
                        log('# ');
                    }
                }
                
                commandInput.value = '';
            }
        });

        // Update clock
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Get hostname
        fetch('/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('hostname').textContent = `Host: ${data.hostname}`;
            });

        // Connect WebSocket
        connect();

        // Focus input
        commandInput.focus();
    </script>
</body>
</html>
