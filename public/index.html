<!DOCTYPE html>
<html>
<head>
    <title>Arch Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e1a; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        h1 { 
            color: #00ff00; 
            border-bottom: 2px solid #00ff00; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        #terminal { 
            flex: 1; 
            background: #000; 
            border: 2px solid #00ff00; 
            border-radius: 8px; 
            padding: 15px; 
            overflow-y: auto; 
            font-family: 'Courier New', monospace; 
            font-size: 14px; 
            line-height: 1.6; 
            margin-bottom: 20px; 
            white-space: pre-wrap;
        }
        .input-line { 
            display: flex; 
            align-items: center; 
            background: #000; 
            border: 2px solid #00ff00; 
            border-radius: 8px; 
            padding: 10px; 
        }
        .prompt { 
            color: #ff0000; 
            font-weight: bold; 
            margin-right: 10px; 
        }
        #command { 
            flex: 1; 
            background: #000; 
            border: none; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            font-size: 16px; 
            outline: none; 
        }
        .current-dir {
            color: #888;
            margin: 5px 0;
            font-size: 12px;
        }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <h1>Arch Terminal Controller</h1>
    <div class="current-dir" id="current-dir">📁 /root</div>
    <div id="terminal"></div>
    <div class="input-line">
        <span class="prompt">#</span>
        <input type="text" id="command" placeholder="Type command..." autocomplete="off">
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command');
        let ws = null;
        let currentDir = '/root';

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                log('✅ Connected to Arch Linux\n');
                log('# ');
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'output') {
                    if (data.data === '# ') {
                        terminal.innerHTML += `<span style="color: #ff0000;"># </span>`;
                    } else {
                        terminal.innerHTML += escapeHtml(data.data);
                    }
                } else if (data.type === 'error') {
                    terminal.innerHTML += `<span style="color: #ff4444;">❌ ${escapeHtml(data.data)}</span>`;
                }
                terminal.scrollTop = terminal.scrollHeight;
            };

            ws.onclose = () => {
                log('❌ Disconnected. Reconnecting...\n');
                setTimeout(connect, 3000);
            };
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function log(msg) {
            terminal.innerHTML += msg;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function parseDirFromCommand(cmd) {
            if (cmd.startsWith('cd ')) {
                const dir = cmd.substring(3).trim();
                if (dir === '..') {
                    currentDir = currentDir.split('/').slice(0, -1).join('/') || '/';
                } else if (dir.startsWith('/')) {
                    currentDir = dir;
                } else {
                    currentDir = currentDir === '/' ? `/${dir}` : `${currentDir}/${dir}`;
                }
                document.getElementById('current-dir').textContent = `📁 ${currentDir}`;
            }
        }

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && commandInput.value.trim()) {
                const cmd = commandInput.value.trim();
                
                // Hiển thị command
                terminal.innerHTML += `<span style="color: #00ff00;">[root@arch]# ${escapeHtml(cmd)}</span>\n`;
                
                // Xử lý cd command local
                if (cmd.startsWith('cd ')) {
                    parseDirFromCommand(cmd);
                }
                
                // Special commands
                if (cmd === 'clear') {
                    terminal.innerHTML = '';
                    log('# ');
                } else if (cmd === 'pwd') {
                    log(`${currentDir}\n`);
                    log('# ');
                } else if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'command', command: cmd }));
                } else {
                    log('❌ Not connected\n# ');
                }
                
                commandInput.value = '';
            }
        });

        connect();
    </script>
</body>
</html>
